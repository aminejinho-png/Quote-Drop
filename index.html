<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>QuoteDrop PWA</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        h1 { color: #333; }
        .quote { font-size: 1.5em; margin: 20px 0; }
        button { padding: 10px 15px; font-size: 1em; }
    </style>
</head>
<body>
    <h1>Welcome to QuoteDrop!</h1>
    <div class="quote" id="quote">Loading quote...</div>
    <button onclick="fetchQuote()">Get Another Quote</button>
    <script>
        async function fetchQuote() {
            const response = await fetch('https://api.quotable.io/random');
            const data = await response.json();
            document.getElementById('quote').innerText = data.content;
        }
        fetchQuote();  // Fetch the first quote on load
    </script>
</body>
</html>
